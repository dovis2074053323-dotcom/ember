<html lang="en">

<title>Ember</title>

*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;background:#0a0e1a;font-family:'DotGothic16',monospace;color:#e8dcc8;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
::selection{background:rgba(240,160,80,0.3)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0e1a}
::-webkit-scrollbar-thumb{background:#2a2040}

/* ── Starfield ── */
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.stars-layer{position:absolute;inset:0;background:transparent}
.stars-layer.s1{
  background-image:
    radial-gradient(1px 1px at 10% 15%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 25% 8%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 40% 22%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 55% 5%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 70% 18%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 85% 12%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 15% 35%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 33% 42%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 50% 30%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 65% 38%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 80% 45%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 92% 28%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 8% 55%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 22% 62%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 45% 58%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 60% 52%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 75% 60%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 88% 55%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 5% 75%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 18% 82%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 35% 78%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 52% 85%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 68% 72%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 82% 80%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 95% 70%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 12% 92%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 30% 95%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 48% 90%, #ffeedd 50%, transparent 100%),
    radial-gradient(1px 1px at 72% 95%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 90% 88%, #fff 50%, transparent 100%);
  animation: twinkle1 4s ease-in-out infinite alternate;
}
.stars-layer.s2{
  background-image:
    radial-gradient(1.5px 1.5px at 5% 20%, rgba(255,220,180,0.8) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 50%, rgba(255,255,255,0.8) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 15%, rgba(255,220,180,0.8) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 40%, rgba(255,255,255,0.8) 50%, transparent 100%),

@keyframes twinkle1{0%{opacity:.6}100%{opacity:1}}
@keyframes twinkle2{0%{opacity:1}100%{opacity:.5}}

/* ── Shell ── */
.shell{min-height:100vh;position:relative}

/* ── Typography ── */
.label{letter-spacing:3px;text-transform:uppercase;font-size:9px;color:#6a5f80;font-family:'DotGothic16',monospace}
.footer{text-align:center;letter-spacing:3px;text-transform:uppercase;font-size:9px;color:#4a4060;padding:16px 0}

/* ── Nav ── */
.nav-btn{background:none;border:none;font-family:'DotGothic16',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;padding:4px 0}

/* ── Buttons ── */
.btn{padding:8px 16px;border:2px solid #3a3050;background:#141830;color:#e8dcc8;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'DotGothic16',monospace;cursor:pointer;box-shadow:2px 2px 0 #1a1530}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #1a1530}
.btn-dk{padding:8px 16px;border:2px solid #f0a050;background:#f0a050;color:#0a0e1a;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'DotGothic16',monospace;cursor:pointer;box-shadow:3px 3px 0 #805020}
.btn-dk:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #805020}

/* ── Inputs ── */
.input{width:100%;padding:8px 10px;border:2px solid #2a2040;background:#0e1225;color:#e8dcc8;font-family:'DotGothic16',monospace;font-size:12px;outline:none}
.input:focus{border-color:#f0a050}
.input::placeholder{color:#4a4060}

/* ── Annotation ── */
.ann-input{padding:8px 10px;border:2px solid #2a2040;background:#0e1225;color:#e8dcc8;font-family:'DotGothic16',monospace;font-size:12px;outline:none}
.ann-input:focus{border-color:#f0a050}
.ann-input::placeholder{color:#4a4060}
.ann-input:disabled{background:#0a0e1a}
.ann-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#0e1225;border-top:2px solid #2a2040;padding:10px 16px 14px}
.ann-card{padding:14px 16px;background:rgba(20,24,48,0.6);border-left:3px solid #f0a050;margin-bottom:8px}

.hl-text{border-bottom:2px solid #f0a050;background:rgba(240,160,80,0.12);padding-bottom:1px}
.clear-btn{background:none;border:none;color:#6a5f80;font-family:'DotGothic16',monospace;font-size:9px;cursor:pointer;margin-left:6px}

/* ── Shelf (Log cards) ── */
.shelf-plank{
  position:relative;
  margin-bottom:20px;
  padding-bottom:8px;
}
.shelf-plank::after{
  content:'';
  display:block;
  height:8px;
  background: linear-gradient(180deg, #5a3a1e 0%, #7a5030 40%, #6b4226 100%);
  border-radius:0 0 2px 2px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  margin-top:4px;
}
.log-card{
  display:flex;
  margin-bottom:0;
  border:2px solid #2a2040;
  background:#111528;
  cursor:pointer;
  box-shadow:2px 2px 0 #0a0e1a;
  transition:transform .1s;
  position:relative;
}
.log-card.unread{
  border-color:#f0a050;
  box-shadow: 0 0 8px rgba(240,160,80,0.2), 2px 2px 0 #0a0e1a;
}

/* ── Calendar ── */
.dow-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;justify-content:space-between;padding:3px;position:relative;overflow:hidden;transition:transform .1s}
.cal-filled{border:2px solid #2a2040;background:#111528;cursor:pointer}
.cal-filled.unread{border-color:#f0a050;box-shadow:0 0 6px rgba(240,160,80,0.15)}
.cal-empty{border:2px dashed #1a1530;background:transparent}

/* ── Error ── */
.err-box{margin-top:12px;padding:10px;background:rgba(240,80,80,0.15);border:2px solid #f05050;color:#e8dcc8;font-size:11px;line-height:1.6;word-break:break-all}

/* ── Pixel Creature ── */
.creature-zone{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:48px;
  pointer-events:none;
  z-index:40;
}
.creature{
  position:absolute;
  bottom:8px;
  width:16px;
  height:16px;
  image-rendering:pixelated;
  transition: left 2s linear;
}

/* ── Unread dot ── */
.unread-dot{
  display:inline-block;
  width:6px;height:6px;
  background:#f0a050;
  border-radius:50%;
  box-shadow:0 0 4px #f0a050;
  margin-right:6px;
  vertical-align:middle;
  animation: glow-pulse 2s ease-in-out infinite;
}
@keyframes glow-pulse{0%,100%{opacity:1;box-shadow:0 0 4px #f0a050}50%{opacity:.6;box-shadow:0 0 8px #f0a050}}

/* ── Envelope icons ── */
.envelope-sealed,.envelope-open{
  display:inline-block;
  width:16px;height:12px;
  position:relative;
  vertical-align:middle;
  margin-right:6px;
  flex-shrink:0;
}

/* ── Hearts float ── */
@keyframes float-heart{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-20px) scale(0.5)}
}
.heart-particle{
  position:absolute;
  color:#f06080;
  font-size:8px;
  pointer-events:none;
  animation:float-heart 1.5s ease-out forwards;
}

/* ── Zzz float ── */
@keyframes float-zzz{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-16px) translateX(8px)}
}
.zzz-particle{
  position:absolute;
  color:#6a5f80;
  font-size:7px;
  font-family:'DotGothic16',monospace;
  pointer-events:none;
  animation:float-zzz 2s ease-out forwards;
}
</style>
</head>

/* ─── API ─── */
function getApiBase() {
  var url = localStorage.getItem("ember_url");
  if (!url) return "";
  return url.replace(/\/$/, "") + "/functions/v1/ember";
}
async function hashPin(pin) {
  var enc = new TextEncoder().encode(pin);
  var buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
}
function isSetup() {
  return !!localStorage.getItem("ember_url") && !!localStorage.getItem("ember_pin");
}
function api(path) {
  var base = getApiBase();
  if (!base) return Promise.reject(new Error("No API"));
  return fetch(base + (path || ""), {
    headers: { "Content-Type": "application/json" }
  }).then(function(r) {
    return r.json().then(function(d) {
      if (!r.ok) throw new Error(d.error || r.status);
      return d;
    });
  });
}
function apiPost(path, body) {
  var base = getApiBase();
  if (!base) return Promise.reject(new Error("No API"));
  return fetch(base + (path || ""), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(function(r) {
    return r.json().then(function(d) {
      if (!r.ok) throw new Error(d.error || r.status);
      return d;
    });
  });
}
function apiPatch(path, body) {
  var base = getApiBase();
  if (!base) return Promise.reject(new Error("No API"));
  return fetch(base + (path || ""), {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(function(r) {
    return r.json().then(function(d) {
      if (!r.ok) throw new Error(d.error || r.status);
      return d;
    });
  });
}

function PixelCreature(props) {
  var hasUnread = props.hasUnread;
  var _pos = useState(50);
  var pos = _pos[0], setPos = _pos[1];
  var _dir = useState(1);
  var dir = _dir[0], setDir = _dir[1];
  var _frame = useState("idle");
  var frame = _frame[0], setFrame = _frame[1];
  var _walkFrame = useState(0);
  var walkFrame = _walkFrame[0], setWalkFrame = _walkFrame[1];
  var _hearts = useState([]);
  var hearts = _hearts[0], setHearts = _hearts[1];
  var _zzz = useState([]);
  var zzz = _zzz[0], setZzz = _zzz[1];
  var timerRef = useRef(null);

  /* Determine base state */
  var hour = new Date().getHours();
  var isSleepTime = hour >= 23 || hour < 6;

  useEffect(function() {
    function tick() {
      if (isSleepTime) {
        setFrame("sleep");
        /* Float zzz */
        if (Math.random() < 0.3) {
          setZzz(function(prev) {
            return prev.concat([{ id: Date.now(), x: Math.random()*6-3 }]);
          });
        }
      } else if (hasUnread) {
        setFrame("happy");
        /* Float hearts */
        if (Math.random() < 0.4) {
          setHearts(function(prev) {
            return prev.concat([{ id: Date.now(), x: Math.random()*10-5 }]);
          });
        }

  }

  useEffect(function() {
    if (getApiBase() && page !== "connect" && page !== "locked") loadEntries();
  }, [page]);

  function openDetail(entry, from) {
    if (entry.id && getApiBase()) {
      api("/entry?id=" + entry.id).then(function(full) {
        setDetailEntry(full); setDetailFrom(from); setPage("detail");
      }).catch(function(e) {
        console.error(e); setDetailEntry(entry); setDetailFrom(from); setPage("detail");
      });
    } else {
      setDetailEntry(entry); setDetailFrom(from); setPage("detail");
    }
  }

  function handleConnect() {
    if (!connectUrl.trim() || !pinInput.trim()) return;
    if (pinInput !== pinConfirm) { setErrMsg("PIN does not match"); return; }
    if (pinInput.length < 4) { setErrMsg("PIN must be at least 4 characters"); return; }
    var url = connectUrl.trim().replace(/\/$/, "");
    var testUrl = url + "/functions/v1/ember";
    setErrMsg(""); setConnecting(true);
    fetch(testUrl, { headers: { "Content-Type": "application/json" } })
      .then(function(r) {
        setConnecting(false);
        if (r.ok) {
          hashPin(pinInput).then(function(h) {
            localStorage.setItem("ember_url", url);
            localStorage.setItem("ember_pin", h);
            window.location.hash = "";
            setPage("home");
          });
        } else {
          r.text().then(function(t) { setErrMsg("Failed ("+r.status+"): "+t.slice(0,80)); });
        }
      })
      .catch(function(e) { setConnecting(false); setErrMsg("Cannot reach: "+e.message); });
  }

  function handleUnlock() {
    if (!pinInput.trim()) return;
    setPinErr("");
    hashPin(pinInput).then(function(h) {
      if (h === localStorage.getItem("ember_pin")) {
        setPage("home"); setPinInput("");
      } else {
        setPinErr("Wrong PIN"); setPinInput("");
      }
    });
  }

  function handleReset() {
    if (confirm("This will disconnect Ember. You will need to re-enter the Supabase URL and set a new PIN.")) {
      localStorage.removeItem("ember_url");
      localStorage.removeItem("ember_pin");
      setPage("connect"); setPinInput(""); setPinErr("");
    }
  }

  var latest = entries.length > 0 ? entries[0] : null;
  var showCreature = page !== "connect" && page !== "locked";

  /* ── LOCKED ── */
  if (page === "locked") {
    return React.createElement("div", { className: "shell" },
      React.createElement(Starfield, null),
      React.createElement("div", {
        style: { display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          minHeight:"100vh", position:"relative", zIndex:1, padding:"20px" }
      },
        React.createElement("div", { style: {
          width:"48px", height:"48px", margin:"0 auto 12px",
          background:"radial-gradient(circle at 50% 60%, #ffd080 0%, #f0a050 40%, #e06030 70%, transparent 100%)",
          borderRadius:"50% 50% 50% 50% / 60% 60% 40% 40%",
          boxShadow:"0 0 20px rgba(240,160,80,0.4)"
        } }),
        React.createElement("h1", {
          style: { fontSize:"24px", color:"#e8dcc8", letterSpacing:"6px", margin:"4px 0 8px",
            textShadow:"0 0 8px rgba(240,160,80,0.3)" }
        }, "EMBER"),
        React.createElement("div", { className:"label", style:{ marginBottom:"24px" } }, "ENTER PIN TO UNLOCK"),
        React.createElement("div", { style:{ width:"100%", maxWidth:"360px" } },
          React.createElement("input", {
            className:"input", type:"password", value:pinInput,
            onChange:function(e){ setPinInput(e.target.value); },
            onKeyDown:function(e){ if(e.key==="Enter") handleUnlock(); },
            placeholder:"PIN",
            style:{ textAlign:"center", letterSpacing:"8px", fontSize:"18px" }
          }),
          pinErr && React.createElement("div", {
            style:{ color:"#f06060", fontSize:"11px", marginTop:"8px", textAlign:"center" }
          }, pinErr),
          React.createElement("button", {
            onClick:handleUnlock, className:"btn-dk", style:{ width:"100%", marginTop:"16px" }
          }, "UNLOCK"),
          React.createElement("button", {
            onClick:handleReset, className:"clear-btn",
            style:{ width:"100%", marginTop:"12px", textAlign:"center", fontSize:"9px" }
          }, "DISCONNECT & RESET")
        )
      )
    );
  }

  /* ── CONNECT ── */
  if (page === "connect") {
    return React.createElement("div", { className: "shell" },
      React.createElement(Starfield, null),
      React.createElement("div", {
        style: { display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          minHeight:"100vh", position:"relative", zIndex:1, padding:"20px" }
      },
        React.createElement("div", { style: {
          width:"48px", height:"48px", margin:"0 auto 12px",
          background:"radial-gradient(circle at 50% 60%, #ffd080 0%, #f0a050 40%, #e06030 70%, transparent 100%)",
          borderRadius:"50% 50% 50% 50% / 60% 60% 40% 40%",
          boxShadow:"0 0 20px rgba(240,160,80,0.4)"
        } }),
        React.createElement("h1", {
          style: { fontSize:"24px", color:"#e8dcc8", letterSpacing:"6px", margin:"4px 0 8px",
            textShadow:"0 0 8px rgba(240,160,80,0.3)" }
        }, "EMBER"),
        React.createElement("div", { className:"label", style:{ marginBottom:"24px" } }, "CONNECT YOUR DIARY"),
        React.createElement("div", { style:{ width:"100%", maxWidth:"360px" } },
          React.createElement("div", { className:"label", style:{ marginBottom:"6px" } }, "SUPABASE URL"),
          React.createElement("input", {
            className:"input", value:connectUrl,
            onChange:function(e){ setConnectUrl(e.target.value); },
            placeholder:"https://xxx.supabase.co"
          }),
          React.createElement("div", { className:"label", style:{ marginTop:"16px", marginBottom:"6px" } }, "SET PIN"),
          React.createElement("input", {
            className:"input", type:"password", value:pinInput,
            onChange:function(e){ setPinInput(e.target.value); },
            placeholder:"Enter PIN (4+ characters)"
          }),
          React.createElement("div", { className:"label", style:{ marginTop:"10px", marginBottom:"6px" } }, "CONFIRM PIN"),
          React.createElement("input", {
            className:"input", type:"password", value:pinConfirm,
            onChange:function(e){ setPinConfirm(e.target.value); },
            placeholder:"Confirm PIN"
          }),
          React.createElement("button", {
            onClick:handleConnect, className:"btn-dk",
            style:{ width:"100%", padding:"10px", marginTop:"12px", opacity:connecting?0.6:1 }
          }, connecting ? "TESTING..." : "CONNECT"),
          errMsg && React.createElement("div", { className:"err-box" }, errMsg)
        ),
        React.createElement("div", { className:"footer", style:{ position:"absolute", bottom:"24px" } },
          "EMBER \u00B7 Built with \u2661 by Iris & Lux")
      )
    );
  }

  /* ── MAIN ── */
  return React.createElement("div", { className: "shell" },
    React.createElement(Starfield, null),
    React.createElement("div", { style: { position:"relative", zIndex:1, paddingBottom:"60px" } },
      React.createElement(Header, { page:page, setPage:setPage, setDetailFrom:setDetailFrom, unreadCount:unreadCount }),
      page === "home" && !loading && latest && React.createElement(EntryView, {
        entry: latest, showBack: false, onMarkRead: markRead
      }),
      page === "home" && !loading && !latest && React.createElement("div", {
        style: { textAlign:"center", color:"#4a4060", fontSize:"12px", padding:"60px 16px" }
      }, "No entries yet. Lux hasn\u2019t written anything."),
      page === "home" && loading && React.createElement("div", {
        style: { textAlign:"center", color:"#4a4060", fontSize:"12px", padding:"60px 16px" }
      }, "Loading..."),
      page === "log" && React.createElement(LogPage, {
        entries: entries, onSelect: function(e){ openDetail(e, "log"); }
      }),
      page === "words" && React.createElement(WordsPage, {
        entries: entries, onSelect: function(e){ openDetail(e, "words"); }
      }),
      page === "detail" && detailEntry && React.createElement(EntryView, {
        entry: detailEntry, showBack: true, onMarkRead: markRead,
        onBack: function(){ setPage(detailFrom); }
      }),
      (page === "log" || page === "words") && React.createElement("div", { className:"footer" },
        "EMBER \u00B7 Built with \u2661 by Iris & Lux")
    ),
    showCreature && React.createElement(PixelCreature, { hasUnread: unreadCount > 0 })
  );
}

ReactDOM.render(React.createElement(App, null), document.getElementById("root"));
</script>
