/* ─── Starfield (canvas, true random) ─── */
(function(){
  var c=document.getElementById("star-canvas"),ctx=c.getContext("2d");
  var stars=[],STAR_COUNT=180,twinklers=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;generate();}
  function generate(){
    stars=[];
    for(var i=0;i<STAR_COUNT;i++){
      stars.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()*1.2+0.3,
        base:Math.random()*0.5+0.3,
        phase:Math.random()*Math.PI*2,
        speed:Math.random()*0.005+0.002
      });
    }
  }
  function draw(t){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      var flicker=s.base+Math.sin(t*s.speed+s.phase)*0.2;
      if(flicker<0.05)flicker=0.05;
      if(flicker>1)flicker=1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle="rgba(192,200,224,"+flicker.toFixed(2)+")";
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener("resize",resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
